# Training Configuration
experiment_name: "poultry_disease_classification"
seed: 42

# Data
data:
  dataset_dir: "data/final_dataset_10_classes"
  image_size: 224
  num_classes: 10
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15

# Model
model:
  architecture: "resnet50"
  pretrained: true
  dropout: 0.3

# Training
training:
  num_epochs: 50
  batch_size: 32
  num_workers: 0
  
  optimizer:
    type: "adamw"
    lr: 0.0001
    weight_decay: 0.0001
  
  loss:
    use_class_weights: true
    label_smoothing: 0.1
  
  early_stopping:
    enabled: true
    patience: 10
  
  mixed_precision: true

# Augmentation
augmentation:
  train:
    horizontal_flip: 0.5
    vertical_flip: 0.3
    rotation: 15
    color_jitter: true
    random_erasing: 0.1

# Logging
logging:
  log_dir: "logs"
  tensorboard_dir: "runs"
  save_model_dir: "models"
